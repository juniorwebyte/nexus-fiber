version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drop_app
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      # Ignora mapeamento do node_modules raiz para o apache nuo mexer nisso
      - /var/www/html/node_modules
    environment:
      - DB_SERVER=db
      - DB_USERNAME=root
      - DB_PASSWORD=drop_root_pass
      - DB_NAME=drop
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: drop_db
    ports:
      - "33060:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=drop_root_pass
      - MYSQL_DATABASE=drop
    volumes:
      - drop_db_data:/var/lib/mysql
    restart: unless-stopped
    # Use native password plugin para retrocompatibilidade com mysqli do PHP
    command: --default-authentication-plugin=mysql_native_password

volumes:
  drop_db_data:
